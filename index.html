<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IOT Mailbox Simulator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f172a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }

    header { text-align: center; }
    header h1 { font-size: 1.75rem; font-weight: 700; }
    header p  { font-size: 0.875rem; color: #94a3b8; margin-top: 0.25rem; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      width: 100%;
      max-width: 860px;
    }

    @media (max-width: 600px) { .layout { grid-template-columns: 1fr; } }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      padding: 0.75rem 1.1rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #94a3b8;
      background: #273549;
      border-bottom: 1px solid #334155;
    }

    /* Control panel */
    .control-body {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .interval-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .interval-row label {
      font-size: 0.78rem;
      color: #94a3b8;
      font-weight: 600;
      white-space: nowrap;
    }

    .interval-row input {
      width: 80px;
      background: #0f172a;
      border: 1.5px solid #334155;
      border-radius: 8px;
      color: #f8fafc;
      font-size: 0.875rem;
      padding: 0.4rem 0.6rem;
      text-align: center;
      outline: none;
      font-family: inherit;
    }
    .interval-row input:focus { border-color: #6366f1; }

    .interval-row span {
      font-size: 0.75rem;
      color: #64748b;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      width: 100%;
      padding: 0.65rem;
      border: none;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.08s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-start  { background: #22c55e; color: #fff; }
    .btn-start:not(:disabled):hover  { opacity: 0.88; }
    .btn-stop   { background: #ef4444; color: #fff; }
    .btn-stop:not(:disabled):hover   { opacity: 0.88; }
    .btn-reset  { background: #475569; color: #f8fafc; }
    .btn-reset:not(:disabled):hover  { background: #64748b; }

    /* Mailbox visual */
    .mailbox-visual {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      gap: 0.75rem;
    }

    .mailbox-icon {
      font-size: 4rem;
      transition: transform 0.3s;
      filter: drop-shadow(0 0 0px transparent);
      transition: filter 0.4s;
    }

    .mailbox-icon.open {
      filter: drop-shadow(0 0 12px #fbbf24);
    }

    .status-badge {
      font-size: 0.85rem;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 999px;
      letter-spacing: 0.05em;
    }
    .badge-idle    { background: #1e293b; color: #64748b; border: 1px solid #334155; }
    .badge-closed  { background: #14532d; color: #86efac; }
    .badge-open    { background: #451a03; color: #fde68a; }
    .badge-alert   { background: #450a0a; color: #fca5a5; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }

    .light-bar-wrap {
      width: 100%;
      max-width: 180px;
    }

    .light-bar-label {
      font-size: 0.7rem;
      color: #64748b;
      text-align: center;
      margin-bottom: 4px;
    }

    .light-bar-bg {
      background: #0f172a;
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
      border: 1px solid #334155;
    }

    .light-bar-fill {
      height: 100%;
      border-radius: 999px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
      background: #64748b;
    }

    /* Notification panel */
    .notification-body {
      padding: 1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 120px;
    }

    .notif-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

    .notif-open    { background: #451a03; color: #fde68a; border: 1px solid #92400e; }
    .notif-closed  { background: #052e16; color: #86efac; border: 1px solid #166534; }
    .notif-warning { background: #450a0a; color: #fca5a5; border: 1px solid #991b1b; }
    .notif-info    { background: #1e3a5f; color: #93c5fd; border: 1px solid #1d4ed8; }

    .notif-empty {
      font-size: 0.8rem;
      color: #475569;
      text-align: center;
      margin: auto;
    }

    /* Log panel */
    .log-body {
      padding: 0.75rem 1rem;
      height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
    }

    .log-body::-webkit-scrollbar { width: 4px; }
    .log-body::-webkit-scrollbar-track { background: transparent; }
    .log-body::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    .log-line {
      display: flex;
      gap: 8px;
      padding: 2px 0;
      border-bottom: 1px solid #1e293b;
      animation: fadeIn 0.2s ease;
    }

    .log-time  { color: #475569; flex-shrink: 0; }
    .log-open  { color: #fde68a; }
    .log-close { color: #86efac; }
    .log-info  { color: #93c5fd; }
    .log-warn  { color: #fca5a5; }
  </style>
</head>
<body>

  <header>
    <h1>📬 IOT Mailbox Simulator</h1>
    <p>Simulates an IoT-enabled mailbox that detects door open/close via light levels</p>
  </header>

  <div class="layout">

    <!-- Control Panel -->
    <div class="card">
      <div class="card-header">⚙️ Control Panel</div>
      <div class="control-body">

        <div class="interval-row">
          <label>Interval</label>
          <input type="number" id="interval-input" value="500" min="100" max="5000" step="100" />
          <span>ms</span>
        </div>

        <div class="btn-group">
          <button class="btn-start" id="btn-start" onclick="startMonitoring()">▶ Start Monitoring</button>
          <button class="btn-stop"  id="btn-stop"  onclick="stopMonitoring()" disabled>⏹ Stop Monitoring</button>
          <button class="btn-reset" id="btn-reset" onclick="resetAll()">↺ Reset</button>
        </div>

        <!-- Mailbox visual -->
        <div class="mailbox-visual">
          <div class="mailbox-icon" id="mailbox-icon">📪</div>
          <span class="status-badge badge-idle" id="status-badge">Idle</span>
          <div class="light-bar-wrap">
            <div class="light-bar-label">Light Level</div>
            <div class="light-bar-bg">
              <div class="light-bar-fill" id="light-bar"></div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Right column: Notification + Log -->
    <div style="display:flex;flex-direction:column;gap:1.25rem;">

      <!-- Notification Panel -->
      <div class="card">
        <div class="card-header">🔔 Notifications</div>
        <div class="notification-body" id="notif-body">
          <p class="notif-empty">No notifications yet</p>
        </div>
      </div>

      <!-- Log Panel -->
      <div class="card">
        <div class="card-header">📋 Activity Log</div>
        <div class="log-body" id="log-body"></div>
      </div>

    </div>
  </div>

  <script>
    /* ── IOTMailbox class (provided, with bug fix) ── */
    class IOTMailbox {
      constructor(signalInterval = 500, signalCallback) {
        this.signalInterval = signalInterval;
        this.signalCallback = signalCallback;
        this.intervalID = null;
        this.lastLightLevel = 0;
      }

      startMonitoring = () => {
        this.intervalID = window.setInterval(this.signalStateChange, this.signalInterval);
      }

      stopMonitoring = () => {
        if (this.intervalID === null) return;
        window.clearInterval(this.intervalID);
        this.intervalID = null;
      }

      signalStateChange = () => {
        const lightLevel = this.lastLightLevel >= 0
          ? Math.random().toFixed(2) * -1
          : Math.random().toFixed(2);
        // bug fix: original used this.lightLevel (undefined), should be lightLevel
        this.signalCallback(lightLevel);
        this.lastLightLevel = lightLevel;
      }
    }

    /* ── App state ── */
    let mailbox = null;
    let doorOpenTime = null;
    let doorOpenTimer = null;
    let notifCount = 0;

    /* ── DOM refs ── */
    const btnStart    = document.getElementById('btn-start');
    const btnStop     = document.getElementById('btn-stop');
    const logBody     = document.getElementById('log-body');
    const notifBody   = document.getElementById('notif-body');
    const statusBadge = document.getElementById('status-badge');
    const mailboxIcon = document.getElementById('mailbox-icon');
    const lightBar    = document.getElementById('light-bar');

    /* ── Helpers ── */
    function timestamp() {
      return new Date().toLocaleTimeString('en-GB', { hour12: false });
    }

    function addLog(msg, type = 'info') {
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = `<span class="log-time">[${timestamp()}]</span><span class="log-${type}">${msg}</span>`;
      logBody.appendChild(line);
      logBody.scrollTop = logBody.scrollHeight;
    }

    function addNotif(msg, type = 'info') {
      // remove empty placeholder
      const empty = notifBody.querySelector('.notif-empty');
      if (empty) empty.remove();

      // max 5 notifications shown
      while (notifBody.children.length >= 5) notifBody.removeChild(notifBody.firstChild);

      const item = document.createElement('div');
      item.className = `notif-item notif-${type}`;
      item.innerHTML = `<span>${msg}</span>`;
      notifBody.appendChild(item);
      notifCount++;
    }

    function setStatus(label, badgeClass, icon, isOpen) {
      statusBadge.textContent = label;
      statusBadge.className = `status-badge ${badgeClass}`;
      mailboxIcon.textContent = icon;
      mailboxIcon.className = 'mailbox-icon' + (isOpen ? ' open' : '');
    }

    function updateLightBar(level) {
      const pct = Math.abs(level) * 100;
      lightBar.style.width = pct + '%';
      lightBar.style.background = level > 0
        ? `hsl(${45 + pct * 0.5}, 90%, 60%)`   // warm yellow when open
        : '#334155';                              // dim when closed
    }

    /* ── Callback ── */
    function onMailboxSignal(lightLevel) {
      const level = parseFloat(lightLevel);
      const isOpen = level > 0;

      updateLightBar(level);

      if (isOpen) {
        addLog(`Light level: ${level.toFixed(2)} → Door OPEN 📬`, 'open');
        setStatus('Door Open', 'badge-open', '📬', true);

        if (!doorOpenTime) {
          doorOpenTime = Date.now();
          addNotif(`📬 Mail arrived! Door opened at ${timestamp()}`, 'open');
          // audible alert
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 880;
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
            osc.start(); osc.stop(ctx.currentTime + 0.4);
          } catch(e) {}

          // warn if door left open > 10s
          doorOpenTimer = setTimeout(() => {
            addNotif(`⚠️ Door has been open for more than 10 seconds!`, 'warning');
            addLog('Warning: door left open > 10s', 'warn');
            setStatus('Left Open!', 'badge-alert', '📬', true);
          }, 10000);
        }
      } else {
        addLog(`Light level: ${level.toFixed(2)} → Door CLOSED 📪`, 'close');
        setStatus('Door Closed', 'badge-closed', '📪', false);

        if (doorOpenTime) {
          clearTimeout(doorOpenTimer);
          doorOpenTimer = null;
          const elapsed = ((Date.now() - doorOpenTime) / 1000).toFixed(1);
          doorOpenTime = null;
          addNotif(`📪 Door closed after ${elapsed}s`, 'closed');
        }
      }
    }

    /* ── Controls ── */
    function startMonitoring() {
      const interval = parseInt(document.getElementById('interval-input').value) || 500;
      mailbox = new IOTMailbox(interval, onMailboxSignal);
      mailbox.startMonitoring();

      btnStart.disabled = true;
      btnStop.disabled  = false;
      document.getElementById('interval-input').disabled = true;

      addLog(`Monitoring started (interval: ${interval}ms)`, 'info');
      setStatus('Monitoring...', 'badge-closed', '📪', false);
    }

    function stopMonitoring() {
      if (mailbox) mailbox.stopMonitoring();
      clearTimeout(doorOpenTimer);
      doorOpenTimer = null;
      doorOpenTime  = null;

      btnStart.disabled = false;
      btnStop.disabled  = true;
      document.getElementById('interval-input').disabled = false;

      addLog('Monitoring stopped.', 'info');
      setStatus('Stopped', 'badge-idle', '📪', false);
      updateLightBar(0);
    }

    function resetAll() {
      stopMonitoring();
      logBody.innerHTML   = '';
      notifBody.innerHTML = '<p class="notif-empty">No notifications yet</p>';
      setStatus('Idle', 'badge-idle', '📪', false);
      updateLightBar(0);
      addLog('App reset.', 'info');
    }
  </script>
</body>
</html>
